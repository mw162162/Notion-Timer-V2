<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notion Countdown Timer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --border: #2a2a38;
    --text: #e8e6f0;
    --text-dim: #7a7890;
    --accent: #7c6aef;
    --accent-glow: rgba(124, 106, 239, 0.25);
    --danger: #ef4444;
    --danger-glow: rgba(239, 68, 68, 0.2);
    --green: #34d399;
    --green-glow: rgba(52, 211, 153, 0.2);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Outfit', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 30% 20%, rgba(124,106,239,0.06), transparent),
      radial-gradient(ellipse 500px 500px at 70% 80%, rgba(52,211,153,0.04), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 20px;
  }

  /* ── Setup Screen ── */
  .setup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    animation: fadeUp 0.5s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .setup h1 {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .setup h1::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    flex-shrink: 0;
  }

  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .time-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .time-inputs .field { margin-bottom: 0; }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    filter: brightness(1.15);
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .preset-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover {
    color: var(--text);
    border-color: var(--accent);
    background: rgba(124,106,239,0.08);
  }

  /* ── Timer Screen ── */
  .timer-screen {
    text-align: center;
    animation: fadeUp 0.5s ease-out;
  }

  .timer-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .timer-display {
    font-family: var(--mono);
    font-size: clamp(2.8rem, 10vw, 4.5rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 8px;
    position: relative;
  }

  .timer-display .digit-group {
    display: inline-block;
    position: relative;
  }

  .timer-display .separator {
    color: var(--text-dim);
    margin: 0 2px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0.3; }
  }

  .timer-sub {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 28px;
    letter-spacing: 0.06em;
  }

  /* Progress ring */
  .progress-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 28px;
  }

  .progress-ring {
    transform: rotate(-90deg);
    width: 200px;
    height: 200px;
  }

  .progress-ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }

  .progress-ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s ease;
    filter: drop-shadow(0 0 6px var(--accent-glow));
  }

  .progress-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .progress-pct {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
  }

  .progress-pct-label {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .ctrl-btn {
    padding: 12px 28px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ctrl-btn:hover {
    border-color: var(--accent);
    background: rgba(124,106,239,0.08);
  }

  .ctrl-btn.pause { border-color: var(--danger); color: var(--danger); }
  .ctrl-btn.pause:hover { background: var(--danger-glow); }
  .ctrl-btn.resume { border-color: var(--green); color: var(--green); }
  .ctrl-btn.resume:hover { background: var(--green-glow); }

  /* Finished state */
  .finished .timer-display {
    color: var(--danger);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .finished .progress-ring-fill {
    stroke: var(--danger);
    filter: drop-shadow(0 0 8px var(--danger-glow));
  }

  /* Hidden utility */
  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 400px) {
    .app { padding: 12px; }
    .setup { padding: 24px 18px; }
    .progress-wrap { width: 160px; height: 160px; }
    .progress-ring { width: 160px; height: 160px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ── SETUP SCREEN ── -->
  <div class="setup" id="setupScreen">
    <h1>Countdown Timer</h1>

    <input type="hidden" id="timerName" value="Timer">

    <div class="field">
      <label>Quick Presets</label>
      <div class="presets">
        <button class="preset-btn" onclick="setPreset(0,5,0)">5m</button>
        <button class="preset-btn" onclick="setPreset(0,10,0)">10m</button>
        <button class="preset-btn" onclick="setPreset(0,15,0)">15m</button>
        <button class="preset-btn" onclick="setPreset(0,25,0)">25m</button>
        <button class="preset-btn" onclick="setPreset(0,30,0)">30m</button>
        <button class="preset-btn" onclick="setPreset(1,0,0)">1h</button>
        <button class="preset-btn" onclick="setPreset(2,0,0)">2h</button>
      </div>
    </div>

    <div class="field">
      <label>Custom Duration</label>
      <div class="time-inputs">
        <div class="field">
          <input type="number" id="inputH" min="0" max="99" value="0" placeholder="H">
        </div>
        <div class="field">
          <input type="number" id="inputM" min="0" max="59" value="25" placeholder="M">
        </div>
        <div class="field">
          <input type="number" id="inputS" min="0" max="59" value="0" placeholder="S">
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="startTimer()">Start Timer</button>
  </div>

  <!-- ── TIMER SCREEN ── -->
  <div class="timer-screen hidden" id="timerScreen">
    <div class="timer-label" id="displayLabel">TIMER</div>

    <div class="progress-wrap">
      <svg class="progress-ring" viewBox="0 0 200 200">
        <circle class="progress-ring-bg" cx="100" cy="100" r="88"></circle>
        <circle class="progress-ring-fill" id="progressRing" cx="100" cy="100" r="88"
                stroke-dasharray="553" stroke-dashoffset="0"></circle>
      </svg>
      <div class="progress-inner">
        <div class="progress-pct" id="progressPct">100%</div>
        <div class="progress-pct-label">remaining</div>
      </div>
    </div>

    <div class="timer-display" id="timerDisplay">
      <span class="digit-group" id="dH">00</span><span class="separator">:</span><span class="digit-group" id="dM">25</span><span class="separator">:</span><span class="digit-group" id="dS">00</span>
    </div>
    <div class="timer-sub" id="timerSub">started just now</div>

    <div class="controls" id="controls">
      <button class="ctrl-btn pause" id="btnPause" onclick="pauseTimer()">Pause</button>
      <button class="ctrl-btn" onclick="resetTimer()">Reset</button>
    </div>
  </div>

</div>

<script>
  /*
   * KEY DESIGN: The timer calculates remaining time from an absolute
   * end-timestamp (Date.now() based). This means it keeps perfect time
   * even when the tab is backgrounded, throttled, or the device sleeps.
   *
   * On pause, we store the remaining ms instead of the end time.
   */

  let endTime = null;       // absolute ms timestamp when timer hits 0
  let totalMs = 0;          // total duration in ms (for progress calc)
  let pausedRemaining = null; // if paused, ms remaining
  let rafId = null;
  let isPaused = false;
  let isFinished = false;

  const CIRCUMFERENCE = 2 * Math.PI * 88; // ~553

  // URL param support: ?h=0&m=25&s=0&name=Focus&auto=1
  (function initFromParams() {
    const p = new URLSearchParams(window.location.search);
    if (p.has('m') || p.has('h') || p.has('s')) {
      document.getElementById('inputH').value = p.get('h') || 0;
      document.getElementById('inputM').value = p.get('m') || 0;
      document.getElementById('inputS').value = p.get('s') || 0;
    }
    if (p.has('name')) {
      document.getElementById('timerName').value = p.get('name');
    }
    if (p.get('auto') === '1') {
      setTimeout(startTimer, 300);
    }
  })();

  function setPreset(h, m, s) {
    document.getElementById('inputH').value = h;
    document.getElementById('inputM').value = m;
    document.getElementById('inputS').value = s;
  }

  function startTimer() {
    const h = parseInt(document.getElementById('inputH').value) || 0;
    const m = parseInt(document.getElementById('inputM').value) || 0;
    const s = parseInt(document.getElementById('inputS').value) || 0;
    totalMs = ((h * 3600) + (m * 60) + s) * 1000;
    if (totalMs <= 0) return;

    const name = document.getElementById('timerName').value || 'Timer';
    document.getElementById('displayLabel').textContent = name.toUpperCase();
    document.title = name + ' — Countdown';

    endTime = Date.now() + totalMs;
    isPaused = false;
    isFinished = false;
    pausedRemaining = null;

    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('timerScreen').classList.remove('hidden');
    document.getElementById('timerScreen').classList.remove('finished');
    document.getElementById('btnPause').textContent = 'Pause';
    document.getElementById('btnPause').className = 'ctrl-btn pause';

    tick();
  }

  function tick() {
    if (isPaused) return;

    const now = Date.now();
    let remaining = endTime - now;

    if (remaining <= 0) {
      remaining = 0;
      finish();
    }

    updateDisplay(remaining);

    if (!isFinished) {
      rafId = requestAnimationFrame(tick);
    }
  }

  function updateDisplay(remainingMs) {
    const totalSec = Math.ceil(remainingMs / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;

    document.getElementById('dH').textContent = String(h).padStart(2, '0');
    document.getElementById('dM').textContent = String(m).padStart(2, '0');
    document.getElementById('dS').textContent = String(s).padStart(2, '0');

    // Progress
    const pct = totalMs > 0 ? remainingMs / totalMs : 0;
    const offset = CIRCUMFERENCE * (1 - pct);
    document.getElementById('progressRing').style.strokeDashoffset = offset;
    document.getElementById('progressPct').textContent = Math.round(pct * 100) + '%';

    // Elapsed info
    const elapsed = totalMs - remainingMs;
    document.getElementById('timerSub').textContent = formatElapsed(elapsed) + ' elapsed';

    // Tab title
    const short = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const label = document.getElementById('displayLabel').textContent;
    document.title = `${short} — ${label}`;
  }

  function formatElapsed(ms) {
    const sec = Math.floor(ms / 1000);
    if (sec < 60) return sec + 's';
    if (sec < 3600) return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
    return Math.floor(sec / 3600) + 'h ' + Math.floor((sec % 3600) / 60) + 'm';
  }

  function finish() {
    isFinished = true;
    cancelAnimationFrame(rafId);
    document.getElementById('timerScreen').classList.add('finished');
    document.getElementById('btnPause').classList.add('hidden');
    document.title = '⏰ TIME\'S UP!';

    // Audio beep using Web Audio API
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 300, 600].forEach(delay => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + delay / 1000);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay / 1000 + 0.3);
        osc.start(ctx.currentTime + delay / 1000);
        osc.stop(ctx.currentTime + delay / 1000 + 0.3);
      });
    } catch(e) {}

    // Notification if permitted
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('Timer Complete', { body: document.getElementById('displayLabel').textContent + ' has finished!' });
    }
  }

  function pauseTimer() {
    if (isFinished) return;

    if (!isPaused) {
      // Pause: store remaining ms
      isPaused = true;
      pausedRemaining = endTime - Date.now();
      cancelAnimationFrame(rafId);
      document.getElementById('btnPause').textContent = 'Resume';
      document.getElementById('btnPause').className = 'ctrl-btn resume';
    } else {
      // Resume: recalculate end time from stored remaining
      isPaused = false;
      endTime = Date.now() + pausedRemaining;
      pausedRemaining = null;
      document.getElementById('btnPause').textContent = 'Pause';
      document.getElementById('btnPause').className = 'ctrl-btn pause';
      tick();
    }
  }

  function resetTimer() {
    cancelAnimationFrame(rafId);
    isPaused = false;
    isFinished = false;
    endTime = null;
    pausedRemaining = null;
    document.getElementById('timerScreen').classList.add('hidden');
    document.getElementById('timerScreen').classList.remove('finished');
    document.getElementById('setupScreen').classList.remove('hidden');
    document.title = 'Notion Countdown Timer';
  }

  // Request notification permission on first interaction
  document.addEventListener('click', function once() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    document.removeEventListener('click', once);
  });
</script>

</body>
</html>
